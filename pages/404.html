<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 // ROOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #020403;
      flex-direction: column;
      gap: 24px;
      text-align: center;
      padding: 24px;
    }
    .err-code {
      font-family: 'Orbitron', monospace;
      font-size: clamp(60px, 15vw, 120px);
      font-weight: 900;
      color: #5F2E1B;
      text-shadow: 0 0 40px rgba(95,46,27,0.5);
      line-height: 1;
    }
    .err-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: #4a4540;
      letter-spacing: 2px;
    }
    .err-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #3a3530;
    }
  </style>
</head>
<body>
  <div class="err-code">404</div>
  <div class="err-msg">// COMMAND NOT FOUND</div>
  <div class="err-sub">Page does not exist or has been moved.</div>
  <a class="btn" href="../index.html">// Return to Terminal</a>
</body>
</html>
